name: PR Size Labeler

on:
  pull_request_target:
    types: [opened, synchronize, reopened]

concurrency:
  group: pr-size-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions: {}

jobs:
  size-label:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - name: Calculate and apply size label
        uses: pascalgn/size-label-action@v0.5.0
        env:
          GITHUB_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
        with:
          sizes: >
            {
              "0": "xs",
              "20": "s",
              "50": "m",
              "200": "l",
              "800": "xl",
              "2000": "xxl"
            }

      - name: Clean up conflicting size labels
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const number = context.payload.pull_request.number;

            const { data: currentLabels } = await github.rest.issues.listLabelsOnIssue({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: number,
            });

            const standardSizes = new Set([
              'size/xs', 'size/s', 'size/m', 'size/l', 'size/xl', 'size/xxl'
            ]);

            // Find the standard size label that was just applied
            const appliedStandard = currentLabels.find(
              l => standardSizes.has(l.name.toLowerCase())
            );

            if (!appliedStandard) return;

            const keepLabel = appliedStandard.name;

            for (const label of currentLabels) {
              const nameLower = label.name.toLowerCase();
              const isSizeLabel = nameLower.startsWith('size/') || nameLower.startsWith('size:');

              if (isSizeLabel && label.name !== keepLabel) {
                try {
                  await github.rest.issues.removeLabel({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: number,
                    name: label.name,
                  });
                  console.log(`Removed conflicting size label "${label.name}" (kept "${keepLabel}")`);
                } catch (e) {
                  console.log(`Could not remove "${label.name}": ${e.message}`);
                }
              }
            }
