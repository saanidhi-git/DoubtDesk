name: Label Enforcer

# Handles all label lifecycle events:
#   1. duplicate/invalid label added → close + comment (idempotent)
#   2. level:* or size/* added → remove conflicting labels of same group
#   3. level:beginner added to issue → add 'good first issue' + 'beginner friendly'
#   4. Issue closed as not_planned → strip all labels except duplicate/invalid

on:
  issues:
    types: [labeled, closed]
  pull_request_target:
    types: [labeled]

permissions: {}

jobs:
  # ── duplicate/invalid label → close + comment ───────────────────────────────
  handle-dup-invalid:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    if: |
      (
        (github.event_name == 'issues' && github.event.action == 'labeled') ||
        (github.event_name == 'pull_request_target' && github.event.action == 'labeled')
      ) && (
        github.event.label.name == 'duplicate' ||
        github.event.label.name == 'invalid'
      )
    steps:
      - name: Handle duplicate/invalid label (idempotent)
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const labelName = context.payload.label.name;
            const isPR = !!context.payload.pull_request;
            const number = isPR
              ? context.payload.pull_request.number
              : context.issue.number;
            const typeStr = isPR ? 'pull request' : 'issue';

            // Skip if this was triggered by a bot (prevent cascades)
            const actor = context.actor;
            if (actor === 'github-actions[bot]' || actor === 'github-actions') {
              console.log('Label was added by a bot — skipping to prevent cascade.');
              return;
            }

            const marker = `<!-- label-enforcer-${labelName} -->`;

            // Check idempotency
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: number,
            });
            if (comments.some(c => c.body && c.body.includes(marker))) {
              console.log(`Already handled ${labelName} for #${number} — skipping.`);
              return;
            }

            const message = labelName === 'duplicate'
              ? `${marker}\nThis ${typeStr} has been marked as a **duplicate** of an existing one. Closing to keep our tracker organized.\n\n*(Maintainers: To state which issue this duplicates, use \`/duplicate #123\` in a comment!)*`
              : `${marker}\nThis ${typeStr} has been marked as **invalid**. This usually means it does not follow our contributing guidelines, is out of scope, or lacks necessary information.`;

            // Set labels to just the one label
            await github.rest.issues.setLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: number,
              labels: [labelName],
            });

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: number,
              body: message,
            });

            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: number,
              state: 'closed',
              state_reason: 'not_planned',
            });

            console.log(`Closed #${number} as ${labelName}.`);

  # ── Exclusive labels: level:* and size/* ─────────────────────────────────────
  enforce-exclusive:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    if: |
      (
        (github.event_name == 'issues' && github.event.action == 'labeled') ||
        (github.event_name == 'pull_request_target' && github.event.action == 'labeled')
      ) && (
        startsWith(github.event.label.name, 'level:') ||
        startsWith(github.event.label.name, 'Level:') ||
        startsWith(github.event.label.name, 'size/') ||
        startsWith(github.event.label.name, 'Size/') ||
        startsWith(github.event.label.name, 'size:') ||
        startsWith(github.event.label.name, 'Size:')
      )
    steps:
      - name: Remove conflicting labels of same group
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const addedLabel = context.payload.label.name;
            const addedLabelLower = addedLabel.toLowerCase();
            const isPR = !!context.payload.pull_request;
            const number = isPR
              ? context.payload.pull_request.number
              : context.issue.number;

            const isLevel = addedLabelLower.startsWith('level:');
            const isSize = addedLabelLower.startsWith('size/') || addedLabelLower.startsWith('size:');

            if (!isLevel && !isSize) return;

            // Normalize non-standard formats
            const sizeMapping = {
              'size:xs': 'size/xs', 'size:s': 'size/s', 'size:m': 'size/m',
              'size:l': 'size/l', 'size:xl': 'size/xl', 'size:xxl': 'size/xxl',
            };
            const levelMapping = {
              'level:beginner': 'level:beginner',
              'level:intermediate': 'level:intermediate',
              'level:advanced': 'level:advanced',
              'level:critical': 'level:critical',
            };

            let targetLabel = addedLabel;

            // Normalize size labels (size:M → size/m)
            if (isSize && sizeMapping[addedLabelLower] && sizeMapping[addedLabelLower] !== addedLabel) {
              const mapped = sizeMapping[addedLabelLower];
              console.log(`Normalizing "${addedLabel}" to "${mapped}"`);
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: number,
                labels: [mapped],
              });
              try {
                await github.rest.issues.removeLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: number,
                  name: addedLabel,
                });
              } catch (e) {
                console.log(`Could not remove "${addedLabel}": ${e.message}`);
              }
              targetLabel = mapped;
            }

            // Normalize level labels (Level:Beginner → level:beginner)
            if (isLevel && levelMapping[addedLabelLower] && levelMapping[addedLabelLower] !== addedLabel) {
              const mapped = levelMapping[addedLabelLower];
              console.log(`Normalizing "${addedLabel}" to "${mapped}"`);
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: number,
                labels: [mapped],
              });
              try {
                await github.rest.issues.removeLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: number,
                  name: addedLabel,
                });
              } catch (e) {
                console.log(`Could not remove "${addedLabel}": ${e.message}`);
              }
              targetLabel = mapped;
            }

            const targetLabelLower = targetLabel.toLowerCase();

            // Remove conflicting labels
            const { data: currentLabels } = await github.rest.issues.listLabelsOnIssue({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: number,
            });

            for (const label of currentLabels) {
              if (label.name.toLowerCase() === targetLabelLower) continue;

              const labelLower = label.name.toLowerCase();
              const shouldRemove =
                (isLevel && labelLower.startsWith('level:')) ||
                (isSize && (labelLower.startsWith('size/') || labelLower.startsWith('size:')));

              if (!shouldRemove) continue;

              try {
                await github.rest.issues.removeLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: number,
                  name: label.name,
                });
                console.log(`Removed conflicting "${label.name}" (replaced by "${targetLabel}")`);
              } catch (e) {
                console.log(`Could not remove "${label.name}": ${e.message}`);
              }
            }

  # ── level:beginner on issue → add beginner-friendly tags ─────────────────────
  sync-beginner-tags:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    if: |
      github.event_name == 'issues' &&
      github.event.action == 'labeled' &&
      github.event.label.name == 'level:beginner'
    steps:
      - name: Add beginner-friendly labels
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: ['good first issue', 'beginner friendly'],
            });

  # ── Issue closed as not_planned → strip labels ──────────────────────────────
  cleanup-not-planned:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    if: |
      github.event_name == 'issues' &&
      github.event.action == 'closed' &&
      github.event.issue.state_reason == 'not_planned'
    steps:
      - name: Strip all labels except duplicate/invalid
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const keepLabels = new Set(['duplicate', 'invalid']);
            const { data: labels } = await github.rest.issues.listLabelsOnIssue({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            for (const label of labels) {
              if (keepLabels.has(label.name)) continue;
              try {
                await github.rest.issues.removeLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.issue.number,
                  name: label.name,
                });
                console.log(`Removed label: ${label.name}`);
              } catch (e) {
                console.log(`Could not remove ${label.name}: ${e.message}`);
              }
            }
